<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Animix - 动漫集结地</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0b0b0e;
            color: #ffffff;
            padding-bottom: 80px;
        }
        body.light { background: #f2f2f6; color: #1c1c1e; }
        body.light .bottom-nav { background: rgba(255,255,255,0.85); border: 0.5px solid rgba(0,0,0,0.1); }
        body.light .nav-item.active { color: #e65c6b; background: rgba(230,92,107,0.1); }
        body.light .search-bar { background: rgba(0,0,0,0.05); }
        body.light .anime-card { background: rgba(255,255,255,0.7); }
        body.light .chat-messages { background: rgba(0,0,0,0.1); }
        body.light .chat-input-area input { background: rgba(0,0,0,0.1); color: #1c1c1e; }
        body.light .ep-btn { background: #e5e5ea; color: #1c1c1e; }
        body.light .ep-btn.active { background: #ff7b89; color: white; }
        body.light .modal-card { background: #fff; color: #1c1c1e; }
        body.light .modal-card input { background: #f0f0f0; color: #1c1c1e; }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(30,30,35,0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            color: #aaa;
            cursor: pointer;
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
        }
        .nav-item.active { color: #ff7b89; background: rgba(255,123,137,0.15); border-radius: 24px; }
        .page { display: none; padding: 20px 16px 30px; max-width: 1200px; margin: 0 auto; }
        .page.active { display: block; }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .circle-icon { width: 44px; height: 44px; background: #1f1f24; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid white; }
        .circle-icon img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #ff7b89, #ff9a5a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-bar { background: rgba(255,255,255,0.1); border-radius: 30px; padding: 12px 18px; margin-bottom: 20px; display: flex; gap: 8px; }
        .search-bar input { flex: 1; background: transparent; border: none; outline: none; color: inherit; font-size: 16px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
        .anime-card { background: rgba(30,30,35,0.6); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .anime-card:hover { transform: translateY(-4px); }
        .anime-card img { width: 100%; aspect-ratio: 194 / 259; object-fit: cover; }
        .anime-info { padding: 10px; }
        .anime-title { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .anime-ep { font-size: 12px; color: #ff9a5a; }
        .loading-text, .empty-text { text-align: center; padding: 40px; color: #aaa; }
        .debug-info { font-size: 12px; color: #ff9a5a; text-align: center; margin-top: 20px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 12px; }

        /* 播放器 - 支持自定义全屏 */
        #player-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1500;
            overflow-y: auto;
        }
        .player-container {
            width: 100%;
            min-height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        /* 全屏容器 */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 自定义全屏模式 */
        .video-wrapper.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2000;
            background: #000;
        }
        .video-wrapper.fullscreen iframe,
        .video-wrapper.fullscreen video {
            width: 100vw;
            height: 100vh;
        }
        .video-wrapper iframe {
            width: 100%;
            height: 50vh;
            border: none;
        }
        .video-wrapper video {
            width: 100%;
            max-height: 50vh;
        }
        .danmu-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        /* 全屏时隐藏默认的播放器控制栏（避免重复） */
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            z-index: 20;
            font-size: 20px;
        }
        .close-player-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            color: white;
            backdrop-filter: blur(10px);
            z-index: 20;
        }
        .player-info-panel {
            background: rgba(20,20,25,0.95);
            padding: 16px;
            transition: transform 0.3s;
        }
        .episode-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0;
        }
        .ep-btn {
            background: #2c2c2e;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
        }
        .ep-btn.active { background: #ff7b89; }
        .danmu-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 30px;
            margin-bottom: 12px;
        }
        .danmu-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .danmu-switch input {
            width: 44px;
            height: 24px;
            appearance: none;
            background: #3a3a3c;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
        }
        .danmu-switch input:checked { background: #ff7b89; }
        .danmu-switch input::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .danmu-switch input:checked::before { left: 21px; }
        .danmu-color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .danmu-color-btn.active { border-color: white; }
        .danmu-speed {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .danmu-speed input { width: 80px; }
        .chat-container {
            margin-top: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
        }
        .chat-messages {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            min-height: 150px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 12px;
        }
        .chat-message {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        .chat-message .sender { color: #ff7b89; font-weight: bold; margin-right: 8px; }
        .chat-message .time { color: #888; font-size: 10px; margin-left: 8px; }
        .chat-input-area {
            display: flex;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            padding: 12px 16px;
            color: white;
            outline: none;
        }
        .chat-input-area button {
            background: #ff7b89;
            border: none;
            border-radius: 30px;
            padding: 0 18px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .sign-card {
            background: rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }
        .sign-btn {
            background: #ff7b89;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
            color: white;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .avatar-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff7b89;
            cursor: pointer;
        }
        .user-info h3 { font-size: 18px; }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .toggle-switch {
            width: 50px;
            height: 28px;
            background: #3a3a3c;
            border-radius: 30px;
            position: relative;
        }
        .toggle-switch.active { background: #ff7b89; }
        .toggle-switch::after {
            content: "";
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active::after { left: 23px; }
        .logout-btn {
            background: rgba(255,70,70,0.2);
            color: #ff4646;
            text-align: center;
            border-radius: 28px;
            padding: 14px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: #1c1c1e;
            border-radius: 40px;
            padding: 28px;
            width: 90%;
            max-width: 380px;
        }
        .modal-card input {
            width: 100%;
            margin: 12px 0;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: #2c2c2e;
            color: white;
            outline: none;
        }
        .modal-btn {
            background: #ff7b89;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        @media (max-width: 600px) {
            .anime-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
            .ep-btn { padding: 6px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="bottom-nav">
    <div class="nav-item active" data-page="home"><span class="nav-label">主页</span></div>
    <div class="nav-item" data-page="sign"><span class="nav-label">签到</span></div>
    <div class="nav-item" data-page="profile"><span class="nav-label">我的</span></div>
</div>

<div id="page-home" class="page active">
    <div class="logo-area">
        <div class="circle-icon"><img src="icon.png" alt="icon" id="favicon-img" onerror="this.src='https://placehold.co/100x100?text=A'"></div>
        <h1>Animix</h1>
    </div>
    <div class="search-bar"><span>🔍</span><input type="text" id="search-input" placeholder="搜索动漫..."></div>
    <div class="anime-grid" id="anime-grid"><div class="loading-text">加载动漫库中...</div></div>
    <div class="debug-info" id="debug-info"></div>
</div>

<div id="page-sign" class="page">
    <div class="sign-card">
        <h2>每日签到</h2>
        <p id="point-display" style="font-size: 18px; margin: 12px 0;">当前积分: 0</p>
        <button class="sign-btn" id="daily-sign-btn">签到 +5 Point</button>
    </div>
    <div id="announcements-list"><div class="loading-text">公告加载中...</div></div>
</div>

<div id="page-profile" class="page">
    <div id="profile-loggedin" style="display: none;">
        <div class="profile-header">
            <img id="user-avatar" class="avatar-img" src="default.png" alt="avatar">
            <div class="user-info"><h3 id="user-name">用户名</h3><p id="user-points">积分: 0</p></div>
        </div>
        <div class="setting-row" id="change-avatar-btn"><span>修改头像</span><span>✏️</span></div>
        <div class="setting-row" id="theme-toggle"><span>主席模式 (暗色/亮色)</span><div class="toggle-switch" id="theme-switch"></div></div>
        <div class="setting-row" id="feedback-btn"><span>问题反馈</span><span>📋</span></div>
        <div class="logout-btn" id="logout-btn">退出登录</div>
        <div style="text-align:center; margin-top:20px; font-size:12px; opacity:0.6;">版本号 1.0</div>
    </div>
    <div id="profile-login-prompt" style="text-align:center; margin-top: 60px;">
        <button class="sign-btn" id="show-login-modal">登录 / 注册</button>
    </div>
</div>

<div id="player-modal" style="display:none;">
    <div class="player-container">
        <div class="video-wrapper" id="video-wrapper">
            <div id="player-container" style="width:100%;"></div>
            <canvas id="danmu-canvas" class="danmu-canvas"></canvas>
            <div class="fullscreen-btn" id="fullscreen-btn">⛶</div>
            <div class="close-player-btn" id="close-player">✕</div>
        </div>
        <div class="player-info-panel">
            <div style="display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
                <div style="display:flex; gap:12px; align-items:center;">
                    <img id="player-poster" width="50" style="border-radius:12px;">
                    <div><h3 id="player-title" style="font-size:16px;"></h3><p id="player-desc" style="font-size:12px; opacity:0.7;"></p></div>
                </div>
                <div class="danmu-controls">
                    <label class="danmu-switch"><input type="checkbox" id="danmu-toggle" checked><span>弹幕</span></label>
                    <div class="danmu-speed">
                        <span>⚡</span>
                        <input type="range" id="danmu-speed" min="1" max="10" value="5">
                        <span id="speed-value">中速</span>
                    </div>
                    <div style="display:flex; gap:4px;">
                        <div class="danmu-color-btn" data-color="0" style="background:#fff;"></div>
                        <div class="danmu-color-btn" data-color="1" style="background:#ff7b89;"></div>
                        <div class="danmu-color-btn" data-color="2" style="background:#7bff89;"></div>
                        <div class="danmu-color-btn" data-color="3" style="background:#89b3ff;"></div>
                        <div class="danmu-color-btn" data-color="4" style="background:#ffd966;"></div>
                    </div>
                </div>
            </div>
            <div class="episode-buttons" id="episode-list"></div>
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages"><div style="text-align:center; padding:20px; color:#888;">暂无消息</div></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="说点什么...">
                    <button id="send-danmu">弹幕</button>
                    <button id="send-chat">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBhc2JVAoxfk3wEsLee-Gr4I1StgqsPkBU",
        authDomain: "zijunblog.firebaseapp.com",
        projectId: "zijunblog",
        storageBucket: "zijunblog.firebasestorage.app",
        messagingSenderId: "689359220073",
        appId: "1:689359220073:web:be9d4a467f438b6e8de1f8"
    };
    
    let app, auth, db;
    try {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
        console.log("✅ Firebase 初始化成功");
        document.getElementById("debug-info").innerHTML = "✅ Firebase 连接成功";
    } catch(e) {
        console.error("❌ Firebase 初始化失败:", e);
        document.getElementById("debug-info").innerHTML = "❌ Firebase 连接失败";
    }
    
    // 全局变量
    let currentUnsubscribe = null;
    let currentAnimeId = "";
    let currentEpisodeId = "";
    let allMessages = [];
    let danmuEnabled = true;
    let currentDanmuColor = 0;
    let danmuSpeed = 5;
    let danmuElements = [];
    let shownDanmuIds = new Set();
    let currentPlayer = null;
    let isYouTubeMode = false;
    let currentVideoElement = null;
    let timeCheckInterval = null;
    let isFullscreen = false;
    
    const speedMap = {1:0.8, 2:1.0, 3:1.2, 4:1.5, 5:1.8, 6:2.2, 7:2.6, 8:3.0, 9:3.5, 10:4.0};
    const speedNames = ['极慢','慢速','中慢','中速','标准','中快','快速','很快','极快','疯狂'];
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function formatTime(timestamp) {
        if (!timestamp) return "";
        let date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}:${String(date.getSeconds()).padStart(2,'0')}`;
    }
    
    function getCurrentVideoTime() {
        if (currentPlayer && isYouTubeMode) {
            try { return currentPlayer.getCurrentTime(); } catch(e) { return 0; }
        }
        if (currentVideoElement && currentVideoElement.currentTime !== undefined) {
            return currentVideoElement.currentTime;
        }
        return 0;
    }
    
    function updateCanvasSize() {
        const wrapper = document.getElementById('video-wrapper');
        const canvas = document.getElementById('danmu-canvas');
        if (wrapper && canvas) {
            const rect = wrapper.getBoundingClientRect();
            if (rect.width > 0 && rect.height > 0) {
                canvas.width = rect.width;
                canvas.height = rect.height;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
            }
        }
    }
    
    function toggleFullscreen() {
        const wrapper = document.getElementById('video-wrapper');
        if (!wrapper) return;
        
        if (!isFullscreen) {
            wrapper.classList.add('fullscreen');
            document.body.style.overflow = 'hidden';
            isFullscreen = true;
        } else {
            wrapper.classList.remove('fullscreen');
            document.body.style.overflow = '';
            isFullscreen = false;
        }
        setTimeout(updateCanvasSize, 100);
    }
    
    function renderChatMessages() {
        const container = document.getElementById('chat-messages');
        if (!container) return;
        if (allMessages.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">暂无消息，发送第一条弹幕吧~</div>';
            return;
        }
        container.innerHTML = allMessages.slice(-50).map(msg => {
            const danmuTag = msg.isDanmu ? '<span style="color:#ff7b89; font-size:10px;">[弹幕]</span>' : '';
            const timeTag = msg.videoTime ? `<span class="time">@${Math.floor(msg.videoTime)}s</span>` : '';
            return `<div class="chat-message">
                        <span class="sender">${escapeHtml(msg.sender || '匿名')}</span>
                        ${danmuTag}
                        <span class="text">${escapeHtml(msg.text || '')}</span>
                        ${timeTag}
                        <span class="time">${formatTime(msg.timestamp)}</span>
                    </div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function addDanmuToCanvas(text, colorIndex) {
        if (!danmuEnabled) return;
        const canvas = document.getElementById('danmu-canvas');
        if (!canvas) return;
        const width = canvas.width, height = canvas.height;
        if (width === 0 || height === 0) {
            setTimeout(() => addDanmuToCanvas(text, colorIndex), 100);
            return;
        }
        
        const ctx = canvas.getContext('2d');
        const y = 30 + Math.random() * (height - 60);
        const colors = ['#ffffff', '#ff7b89', '#7bff89', '#89b3ff', '#ffd966', '#d966ff'];
        const color = colors[colorIndex % colors.length];
        let x = width;
        const speed = speedMap[danmuSpeed];
        
        const danmu = { text, color, x, y, speed, active: true };
        danmuElements.push(danmu);
        
        function animate() {
            if (!danmuEnabled) return;
            ctx.clearRect(0, 0, width, height);
            danmuElements = danmuElements.filter(d => d.active);
            danmuElements.forEach(d => {
                ctx.font = 'bold 18px -apple-system, BlinkMacSystemFont, "Segoe UI"';
                ctx.fillStyle = d.color;
                ctx.shadowBlur = 2;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.fillText(d.text, d.x, d.y);
                d.x -= d.speed;
                if (d.x + ctx.measureText(d.text).width <= 0) d.active = false;
            });
            if (danmuElements.length > 0) requestAnimationFrame(animate);
        }
        if (danmuElements.length === 1) requestAnimationFrame(animate);
    }
    
    function checkAndShowDanmus(currentTime) {
        if (!danmuEnabled || !allMessages.length) return;
        allMessages.forEach(msg => {
            if (msg.isDanmu && !shownDanmuIds.has(msg.id) && Math.abs(msg.videoTime - currentTime) < 0.5) {
                addDanmuToCanvas(msg.text, msg.color || 0);
                shownDanmuIds.add(msg.id);
            }
        });
    }
    
    function startTimeCheck() {
        if (timeCheckInterval) clearInterval(timeCheckInterval);
        timeCheckInterval = setInterval(() => {
            const ct = getCurrentVideoTime();
            if (ct > 0) checkAndShowDanmus(ct);
        }, 500);
    }
    
    function initFirestoreListener(animeId, episodeId) {
        if (currentUnsubscribe) currentUnsubscribe();
        currentAnimeId = animeId;
        currentEpisodeId = episodeId;
        allMessages = [];
        shownDanmuIds.clear();
        if (!db) return;
        
        const q = db.collection("danmu_messages")
            .where("animeId", "==", animeId)
            .where("episodeId", "==", episodeId)
            .orderBy("timestamp", "asc");
        
        currentUnsubscribe = q.onSnapshot(snapshot => {
            allMessages = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                allMessages.push({
                    id: doc.id,
                    text: data.text,
                    sender: data.sender,
                    isDanmu: data.isDanmu === true,
                    videoTime: data.videoTime || 0,
                    color: data.color || 0,
                    timestamp: data.timestamp
                });
            });
            renderChatMessages();
            const ct = getCurrentVideoTime();
            if (ct > 0) checkAndShowDanmus(ct);
        }, error => console.error("监听错误:", error));
    }
    
    async function sendMessage(text, isDanmu) {
        if (!window.currentUser) { alert("请先登录"); return false; }
        if (!currentAnimeId) { alert("请先播放视频"); return false; }
        
        const videoTime = getCurrentVideoTime();
        await db.collection("danmu_messages").add({
            animeId: currentAnimeId,
            episodeId: currentEpisodeId,
            sender: window.currentUser.displayName || window.currentUser.email?.split('@')[0] || "匿名",
            text: text,
            isDanmu: isDanmu,
            color: isDanmu ? currentDanmuColor : 0,
            videoTime: videoTime,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        if (isDanmu) addDanmuToCanvas(text, currentDanmuColor);
        return true;
    }
    
    window.onYouTubeIframeAPIReady = function() {
        if (window.ytReadyCallback) window.ytReadyCallback();
    };
    
    function renderPlayerContent(url, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        if (timeCheckInterval) clearInterval(timeCheckInterval);
        if (currentPlayer && isYouTubeMode) {
            try { currentPlayer.destroy(); } catch(e) {}
        }
        currentPlayer = null;
        isYouTubeMode = false;
        currentVideoElement = null;
        
        const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
        if (ytMatch) {
            const videoId = ytMatch[1];
            container.innerHTML = `<div id="youtube-player" style="width:100%; height:50vh;"></div>`;
            isYouTubeMode = true;
            
            const createPlayer = () => {
                if (window.YT && window.YT.Player) {
                    currentPlayer = new YT.Player('youtube-player', {
                        videoId: videoId,
                        playerVars: {
                            controls: 1,
                            rel: 0,
                            modestbranding: 1,
                            iv_load_policy: 3,
                            fs: 0,  // 禁用 YouTube 原生全屏，使用自定义全屏
                            autoplay: 0,
                            cc_load_policy: 0,
                            showinfo: 0,
                            enablejsapi: 1
                        },
                        events: {
                            onReady: () => {
                                startTimeCheck();
                                setTimeout(updateCanvasSize, 100);
                            },
                            onStateChange: (e) => {
                                if (e.data === 1) {
                                    startTimeCheck();
                                    setTimeout(updateCanvasSize, 100);
                                }
                            }
                        }
                    });
                } else { setTimeout(createPlayer, 100); }
            };
            window.ytReadyCallback = createPlayer;
            if (window.YT && window.YT.Player) createPlayer();
            else {
                if (!document.querySelector('#youtube-api-script')) {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    tag.id = 'youtube-api-script';
                    document.head.appendChild(tag);
                }
            }
            setTimeout(updateCanvasSize, 500);
            return;
        }
        
        if (url.match(/\.(mp4|webm|mov)$/i)) {
            container.innerHTML = `<video controls playsinline style="width:100%; max-height:50vh;" src="${url}"></video>`;
            setTimeout(() => {
                const video = container.querySelector('video');
                if (video) {
                    currentVideoElement = video;
                    startTimeCheck();
                    updateCanvasSize();
                    video.addEventListener('loadedmetadata', updateCanvasSize);
                }
            }, 100);
            return;
        }
        
        if (url.includes('t.me')) {
            container.innerHTML = `<div style="text-align:center; padding:80px 20px;"><p>📱 Telegram 视频</p><a href="${url}" target="_blank" style="color:#ff7b89;">在 Telegram 中打开</a></div>`;
            return;
        }
        
        container.innerHTML = `<div style="text-align:center; padding:80px 20px;"><p>🎬 点击下方按钮下载观看</p><a href="${url}" target="_blank" style="color:#ff7b89;">下载视频</a></div>`;
    }
    
    // GitHub Issues 数据获取
    const DEMO_ANIME = [{
        title: "鬼灭之刃 第一季",
        poster: "https://github.com/user-attachments/assets/c863c3e3-35fb-4474-959f-4aab39055c86",
        episodes: ["https://www.youtube.com/watch?v=K8ngtohhDo4", "https://www.youtube.com/watch?v=calfzpISFWQ"],
        description: "演示数据"
    }];
    
    async function fetchAnimeFromGitHubIssues() {
        const debugDiv = document.getElementById("debug-info");
        const apiUrl = `https://api.github.com/repos/zijunedu0108/zjanime/issues?labels=anime&state=open&per_page=50`;
        debugDiv.innerHTML = "🔍 加载动漫库...";
        try {
            const response = await fetch(apiUrl, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const issues = await response.json();
            if (!issues || issues.length === 0) return DEMO_ANIME;
            const animes = [];
            for (const issue of issues) {
                const title = issue.title, body = issue.body || "";
                const imgMatch = body.match(/<img[^>]+src=["']([^"']+)["']/i);
                let poster = imgMatch ? imgMatch[1] : "https://placehold.co/194x259";
                const episodes = [];
                const lines = body.split('\n');
                for (const line of lines) {
                    const urlMatch = line.match(/https?:\/\/[^\s]+/);
                    if (urlMatch) {
                        let url = urlMatch[0].replace(/[.,;:]$/, '');
                        if (!url.includes('user-attachments') && !url.match(/\.(png|jpg|jpeg|gif|webp)$/i)) episodes.push(url);
                    }
                }
                const descMatch = body.match(/介绍\s*[-:：]\s*([^\n]+)/i);
                let desc = descMatch ? descMatch[1].trim() : "暂无介绍";
                if (episodes.length > 0) animes.push({ title, poster, episodes, description: desc });
            }
            debugDiv.innerHTML = animes.length > 0 ? `✅ 加载 ${animes.length} 部动漫` : `⚠️ 使用演示数据`;
            return animes.length > 0 ? animes : DEMO_ANIME;
        } catch (error) {
            debugDiv.innerHTML = `❌ 加载失败，使用演示数据`;
            return DEMO_ANIME;
        }
    }
    
    async function getAnnouncements() {
        try {
            const response = await fetch(`https://api.github.com/repos/zijunedu0108/zjanime/issues?labels=alert&state=open`, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
            if (!response.ok) return [{ title: "欢迎来到Animix", body: "每日签到获取积分~" }];
            const issues = await response.json();
            return issues.length ? issues.map(i => ({ title: i.title, body: (i.body || "").substring(0, 200) })) : [{ title: "欢迎来到Animix", body: "每日签到获取积分~" }];
        } catch (e) { return [{ title: "欢迎来到Animix", body: "每日签到获取积分~" }]; }
    }
    
    async function getAvatarList() {
        try {
            const response = await fetch(`https://api.github.com/repos/zijunedu0108/zjanime/issues?labels=avatar&state=open`, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
            if (!response.ok) return [];
            const issues = await response.json();
            return issues.map(issue => {
                const imgMatch = issue.body?.match(/<img[^>]+src=["']([^"']+)["']/i);
                return imgMatch ? { name: issue.title, imageUrl: imgMatch[1] } : null;
            }).filter(a => a);
        } catch(e) { return []; }
    }
    
    let episodeUrls = [];
    
    async function renderHomePage(search = "") {
        const grid = document.getElementById("anime-grid");
        grid.innerHTML = '<div class="loading-text">加载动漫库中...</div>';
        let animes = await fetchAnimeFromGitHubIssues();
        let filtered = animes.filter(a => a.title.toLowerCase().includes(search.toLowerCase()));
        if (filtered.length === 0) { grid.innerHTML = '<div class="empty-text">没有找到相关动漫</div>'; return; }
        grid.innerHTML = filtered.map((ani, idx) => `<div class="anime-card" data-idx="${idx}"><img src="${ani.poster}" loading="lazy" onerror="this.src='https://placehold.co/194x259'"><div class="anime-info"><div class="anime-title">${escapeHtml(ani.title)}</div><div class="anime-ep">${ani.episodes.length}集</div></div></div>`).join("");
        document.querySelectorAll(".anime-card").forEach(card => {
            card.addEventListener("click", () => {
                let idx = parseInt(card.getAttribute("data-idx"));
                if (!isNaN(idx) && filtered[idx]) openPlayer(filtered[idx]);
            });
        });
    }
    
    function openPlayer(anime) {
        episodeUrls = anime.episodes;
        const animeId = anime.title.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
        document.getElementById("player-title").innerText = anime.title;
        document.getElementById("player-poster").src = anime.poster;
        document.getElementById("player-desc").innerText = anime.description;
        
        const epBtns = document.getElementById("episode-list");
        epBtns.innerHTML = episodeUrls.map((url, i) => `<button class="ep-btn ${i === 0 ? 'active' : ''}" data-epidx="${i}">第${i + 1}集</button>`).join("");
        
        document.querySelectorAll(".ep-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                let idx = parseInt(btn.getAttribute("data-epidx"));
                const episodeId = `ep_${idx}`;
                renderPlayerContent(episodeUrls[idx], "player-container");
                initFirestoreListener(animeId, episodeId);
                document.querySelectorAll(".ep-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                shownDanmuIds.clear();
                danmuElements = [];
                updateCanvasSize();
            });
        });
        
        renderPlayerContent(episodeUrls[0], "player-container");
        initFirestoreListener(animeId, "ep_0");
        document.getElementById("player-modal").style.display = "block";
        updateCanvasSize();
        shownDanmuIds.clear();
        danmuElements = [];
    }
    
    function showToast(msg) {

        toast.style.cssText = 'position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:12px 24px; border-radius:30px; z-index:3000; font-size:14px;';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

        document.getElementById("player-modal").style.display = "none";
        document.getElementById("player-container").innerHTML = "";
        if (currentUnsubscribe) currentUnsubscribe();

        danmuElements = [];

        const canvas = document.getElementById('danmu-canvas');
        if (canvas) canvas.style.display = danmuEnabled ? 'block' : 'none';

    });

        btn.addEventListener("click", () => {

            btn.classList.add("active");

        });

    document.querySelector(".danmu-color-btn")?.classList.add("active");
    
    document.getElementById("send-danmu")?.addEventListener("click", async () => {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        await sendMessage(text, true);
        input.value = '';
    });
    document.getElementById("send-chat")?.addEventListener("click", async () => {
        const input = document.getElementById('chat-input');

        if (!text) return;
        await sendMessage(text, false);

    window.addEventListener('resize', () => setTimeout(updateCanvasSize, 100));
    
    // 导航栏
    (function() {
        const navItems = document.querySelectorAll('.nav-item');
        const pages = { home: document.getElementById('page-home'), sign: document.getElementById('page-sign'), profile: document.getElementById('page-profile') };
        for (let i = 0; i < navItems.length; i++) {

    async function updateUserPointsUI(user) {
        if (!user || !db) return;
        try {
            const doc = await db.collection("users").doc(user.uid).get();
            const points = doc.exists ? (doc.data().points || 0) : 0;
            document.getElementById("user-points").innerText = `积分: ${points}`;
            document.getElementById("point-display").innerText = `当前积分: ${points}`;
        } catch (error) { console.warn("获取积分失败:", error); }
    }
    
    async function signDaily() {
        if (!window.currentUser) { showToast("请先登录"); return false; }
        if (!db) { showToast("数据库连接失败"); return false; }
        const userRef = db.collection("users").doc(window.currentUser.uid);
        const today = new Date().toDateString();
        try {
            const doc = await userRef.get();
            if (doc.exists && doc.data().lastSign === today) { showToast("今天已经签到过了"); return false; }
            const newPoints = (doc.exists ? (doc.data().points || 0) : 0) + 5;
            await userRef.set({ points: newPoints, lastSign: today }, { merge: true });
            document.getElementById("point-display").innerText = `当前积分: ${newPoints}`;
            document.getElementById("user-points").innerText = `积分: ${newPoints}`;
            showToast("签到成功 +5 point");
            return true;
        } catch (error) { showToast("签到失败: " + error.message); return false; }
    }
    document.getElementById("daily-sign-btn")?.addEventListener("click", signDaily);
    
    let themeSwitch = document.getElementById("theme-switch");
    function applyTheme(theme) {
        if (theme === "light") document.body.classList.add("light");
        else document.body.classList.remove("light");
        localStorage.setItem("theme", theme);
        if (themeSwitch) themeSwitch.classList.toggle("active", theme === "light");
    }
    themeSwitch?.addEventListener("click", () => applyTheme(document.body.classList.contains("light") ? "dark" : "light"));
    applyTheme(localStorage.getItem("theme") || "dark");

                await auth.signInWithEmailAndPassword(document.getElementById("login-email").value, document.getElementById("login-pwd").value);

                showToast("登录成功");
            } catch(e) { showToast(e.message); }
        };

            document.getElementById("do-reg").onclick = async () => {
                let name = document.getElementById("reg-name").value, email = document.getElementById("reg-email").value, pwd = document.getElementById("reg-pwd").value, pwd2 = document.getElementById("reg-pwd2").value;
                if (pwd !== pwd2) return showToast("密码不一致");
                try {
                    const cred = await auth.createUserWithEmailAndPassword(email, pwd);
                    await cred.user.updateProfile({ displayName: name });
                    if (db) await db.collection("users").doc(cred.user.uid).set({ points: 0, lastSign: "", displayName: name, avatarUrl: "default.png" });

                    showToast("注册成功！");
                } catch(e) { showToast(e.message); }
            };
            document.getElementById("back-login").onclick = () => { modal.remove(); showLoginModal(); };

        document.getElementById("close-login").onclick = () => modal.remove();
    }
    document.getElementById("show-login-modal")?.addEventListener("click", showLoginModal);

        window.open("https://docs.google.com/forms/d/e/1FAIpQLScRf0Euxk17tb9dn2muJOgC1ZlAM33pVcOh2jVEwOMzziz_tg/viewform", "_blank");

        if (!window.currentUser) { showToast("请先登录"); return; }
        const avatars = await getAvatarList();
        if (!avatars.length) { showToast("暂无可用头像"); return; }

                showToast("头像已更新");
                modal.remove();
            });
        });

    (async () => {

        if (div) div.innerHTML = ann.map(a => `<div class="announcement-item"><strong>📢 ${escapeHtml(a.title)}</strong><p>${escapeHtml(a.body)}</p></div>`).join("");
    })();
    
    document.getElementById("search-input")?.addEventListener("input", (e) => renderHomePage(e.target.value));
    renderHomePage();
    const faviconImg = document.getElementById("favicon-img");
    if (faviconImg) faviconImg.style.borderRadius = "50%";
</script>
